name: AI Video Engine Auto-Render

on:
  repository_dispatch:
    types: [generate_video]

jobs:
  build_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Fonts & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation imagemagick
          sudo sed -i '/<policy domain="path" rights="none" pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Video & AI Libraries
        run: |
          pip install "setuptools<70.0.0" wheel
          pip install moviepy==1.0.3 requests imageio[ffmpeg] Pillow==9.5.0 openai-whisper setuptools-rust

      - name: Run AI Engine
        run: |
          python engine.py \
            "${{ github.event.client_payload.audio_url }}" \
            "${{ github.event.client_payload.video1_url }}" \
            "${{ github.event.client_payload.video2_url }}" \
            "${{ github.event.client_payload.video3_url }}" \
            "${{ github.event.client_payload.video4_url }}" \
            "${{ github.event.client_payload.video5_url }}" \
            "${{ github.event.client_payload.video6_url }}"

      - name: Save Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Shorts-Video
          path: final_shorts.mp4

      - name: Send Video to n8n Webhook
        run: |
          RESPONSE=$(curl -F "file=@final_shorts.mp4" https://tmpfiles.org/api/v1/upload)
          VIDEO_URL=$(echo $RESPONSE | grep -o '"url":"[^"]*' | grep -o '[^"]*$')
          DIRECT_URL="${VIDEO_URL/tmpfiles.org\//tmpfiles.org/dl/}"
          
          curl -X POST "https://my-n8n-server-37dz.onrender.com/webhook/Qr7jeDdTbb0ykjsy" \
               -H "Content-Type: application/json" \
               -d "{\"video_url\": \"$DIRECT_URL\"}"

