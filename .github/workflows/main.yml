name: AI Video Engine Auto-Render

on:
  repository_dispatch:
    types: [generate_video]

jobs:
  build_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Video Libraries
        run: |
          pip install moviepy==1.0.3 requests imageio[ffmpeg] Pillow==9.5.0

      - name: Run AI Engine
        run: |
          python engine.py \
            "${{ github.event.client_payload.audio_url }}" \
            "${{ github.event.client_payload.video1_url }}" \
            "${{ github.event.client_payload.video2_url }}" \
            "${{ github.event.client_payload.video3_url }}"

      - name: Save Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Shorts-Video
          path: final_shorts.mp4
