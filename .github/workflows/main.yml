name: AI Video Engine Auto-Render

on:
  repository_dispatch:
    types: [generate_video]

jobs:
  build_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Allocate Swap Space (Hardware Hack)
        run: |
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Fonts & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation imagemagick jq
          sudo sed -i '/<policy domain="path" rights="none" pattern="@\*"/d' /etc/ImageMagick-6/policy.xml

      - name: Install Video & AI Libraries
        run: |
          pip install "setuptools<70.0.0" wheel
          pip install moviepy==1.0.3 requests imageio[ffmpeg] Pillow==9.5.0 faster-whisper

      - name: Generate Cinematic Thumbnail
        env:
          IMAGE_URL: ${{ github.event.client_payload.image_url }}
          VIDEO_TITLE: ${{ github.event.client_payload.thumbnail_text }}
          FONT_FILE: "VCR_OSD_MONO_1.001.ttf"
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_thumbnail.py

      - name: Run AI Engine
        env:
          AUDIO_URL: ${{ github.event.client_payload.audio_url }}
          VIDEO_URLS: ${{ github.event.client_payload.video_urls }}
          HOOK_TEXT: ${{ github.event.client_payload.thumbnail_text }}
          TOPIC_NAME: ${{ github.event.client_payload.topic_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          MAX_CLIP_DURATION: ${{ github.event.client_payload.max_clip_duration }}
          TOTAL_CLIPS: ${{ github.event.client_payload.total_clips }}
          TRANSITION_STYLE: ${{ github.event.client_payload.transition_style }}
        run: python engine.py

      - name: Save Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Shorts-Video
          path: final_shorts.mp4

      - name: Send Video to n8n Webhook
        env:
          CAPTION_TEXT: ${{ github.event.client_payload.caption }}
        run: |
          RESPONSE=$(curl -F "file=@final_shorts.mp4" https://tmpfiles.org/api/v1/upload)
          VIDEO_URL=$(echo $RESPONSE | grep -o '"url":"[^"]*' | grep -o '[^"]*$')
          DIRECT_URL="${VIDEO_URL/tmpfiles.org\//tmpfiles.org/dl/}"
          
          jq -n \
            --arg url "$DIRECT_URL" \
            --arg text "$CAPTION_TEXT" \
            '{video_url: $url, caption: $text}' > payload.json
          
          curl -X POST "https://my-n8n-server-37dz.onrender.com/webhook/Qr7jeDdTbb0ykjsy" \
               -H "Content-Type: application/json" \
               -d @payload.json
